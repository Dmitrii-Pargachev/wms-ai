<div id="notif-panel" class="notif-panel">
  <div class="notif-header">
    <h3 style="font-family:'Space Grotesk',sans-serif;font-size:18px;">Уведомления</h3>
    <button onclick="toggleNotifications()" class="notif-close" style="background:none;border:none;color:var(--ink-soft);font-size:22px;cursor:pointer;">✕</button>
  </div>
  <div id="notif-list" class="notif-list"></div>
</div>
<div id="notif-overlay" class="notif-overlay" onclick="toggleNotifications()"></div>
